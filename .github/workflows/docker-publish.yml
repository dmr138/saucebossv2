name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Updated from v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3 # Updated from v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Updated from v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # Updated from v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6 # Updated from v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: dmr138/sauceboss-v2:latest 
          cache-from: type=gha
          cache-to: type=gha,mode=max



